<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TBHインベントリ限界タイマー (ロジック修正版)</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --card-bg: #141622;
            --panel-bg: #0f111a;
            --accent-cyan: #06b6d4;
            --accent-blue: #3b82f6;
            --accent-orange: #f97316;
            --accent-pink: #ec4899;
            --accent-purple: #8b5cf6;
            --text-main: #f3f4f6;
            --text-sub: #9ca3af;
            --border-color: #222538;
        }

        body {
            font-family: 'Segoe UI', Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 8px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 440px;
            width: 100%;
            background-color: var(--card-bg);
            border-radius: 10px;
            padding: 12px 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
            border: 1px solid #1e2235;
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            font-size: 15px;
            margin: 0 0 6px 0;
            color: var(--accent-cyan);
            letter-spacing: 0.5px;
            font-weight: 800;
        }

        .section-box {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 6px 10px;
            margin-bottom: 6px;
        }

        .section-title {
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 4px;
            color: var(--text-sub);
        }
        .title-blue { color: var(--accent-blue); border-left: 3px solid var(--accent-blue); padding-left: 5px; }
        .title-white { color: #e5e7eb; border-left: 3px solid #e5e7eb; padding-left: 5px; }
        .title-base { color: var(--accent-cyan); border-left: 3px solid var(--accent-cyan); padding-left: 5px; }

        .input-row-layout {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-bottom: 3px;
        }

        .input-row-layout label {
            font-size: 11px;
            font-weight: bold;
            color: #d1d5db;
        }

        .input-field-wrap {
            display: flex;
            align-items: center;
            gap: 4px;
            justify-content: flex-end;
            width: 160px;
        }

        .input-field-wrap input {
            background-color: #1c1e2e;
            border: 1px solid var(--border-color);
            color: white;
            width: 55px;
            font-size: 12px;
            font-weight: bold;
            padding: 2px 4px;
            text-align: center;
            border-radius: 4px;
            outline: none;
        }

        .input-field-wrap span {
            font-size: 10px;
            color: var(--text-sub);
            white-space: nowrap;
            width: 45px;
        }

        .btn {
            width: 100%;
            padding: 10px;
            font-size: 14px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
            color: white;
            box-shadow: 0 4px 12px rgba(6, 182, 212, 0.2);
            margin: 10px 0 6px 0;
        }

        .start-time-log {
            text-align: center;
            font-size: 11px;
            color: var(--accent-purple);
            margin-bottom: 6px;
            font-weight: bold;
            min-height: 14px;
        }

        .result-panel {
            background-color: #0b0c10;
            border-radius: 5px;
            padding: 6px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #1a1c2c;
            margin-bottom: 5px;
        }
        .panel-inv { border-left: 4px solid var(--accent-blue); }
        .panel-blue { border-left: 4px solid var(--accent-pink); }
        .panel-white { border-left: 4px solid var(--accent-orange); }

        .result-title { font-size: 11px; color: var(--text-sub); font-weight: bold; }
        .panel-blue .result-title { color: #f472b6; }
        .panel-white .result-title { color: #fdba74; }
        .duration-hint { font-size: 10px; color: #6b7280; margin-top: 1px; }
        .time-stamp { font-size: 20px; font-weight: bold; font-family: 'Courier New', monospace; }
        .panel-inv .time-stamp { color: #93c5fd; }
        .panel-blue .time-stamp { color: #f472b6; }
        .panel-white .time-stamp { color: #fdba74; }
    </style>
</head>
<body>

<div class="container">
    <h1>⏳ TBHインベントリ限界タイマー (修正版)</h1>

    <div class="section-box">
        <div class="section-title title-base">基礎設定</div>
        <div class="input-row-layout">
            <label>クリア時間</label>
            <div class="input-field-wrap">
                <input type="number" id="clearTime" value="210" min="1">
                <span>秒</span>
            </div>
        </div>
        <div class="input-row-layout">
            <label>追加インベントリ枠</label>
            <div class="input-field-wrap">
                <input type="number" id="addInv" value="84" min="0">
                <span>枠</span>
            </div>
        </div>
    </div>

    <div class="section-box">
        <div class="section-title title-blue">🟦 青箱設定 (初期: 600秒 / 保管: 5)</div>
        <div class="input-row-layout">
            <label>ドロップ間隔CT</label>
            <div class="input-field-wrap">
                <input type="number" id="blueCT" value="7" min="1">
                <span>分</span>
            </div>
        </div>
        <div class="input-row-layout">
            <label>自動開封短縮</label>
            <div class="input-field-wrap">
                <input type="number" id="blueOpenReduce" value="55" min="0">
                <span>秒短縮</span>
            </div>
        </div>
        <div class="input-row-layout">
            <label>追加保管数</label>
            <div class="input-field-wrap">
                <input type="number" id="blueMax" value="6" min="0">
                <span>個拡張</span>
            </div>
        </div>
    </div>

    <div class="section-box">
        <div class="section-title title-white">⬜ 白箱設定 (初期: 300秒 / 保管: 5)</div>
        <div class="input-row-layout">
            <label>ドロップ間隔CT</label>
            <div class="input-field-wrap">
                <input type="number" id="whiteCT" value="5" min="1">
                <span>分</span>
            </div>
        </div>
        <div class="input-row-layout">
            <label>自動開封短縮</label>
            <div class="input-field-wrap">
                <input type="number" id="whiteOpenReduce" value="29" min="0">
                <span>秒短縮</span>
            </div>
        </div>
        <div class="input-row-layout">
            <label>追加保管数</label>
            <div class="input-field-wrap">
                <input type="number" id="whiteMax" value="12" min="0">
                <span>個拡張</span>
            </div>
        </div>
    </div>

    <button class="btn" onclick="calculateLimitTime()">⚔️ 最短時刻を計測開始</button>
    <div class="start-time-log" id="startTimeLog"></div>

    <div class="result-list">
        <div class="result-panel panel-inv">
            <div class="result-info">
                <div class="result-title">📦 インベントリが埋まる時刻</div>
                <div class="duration-hint" id="invHint">（残り --時間--分）</div>
            </div>
            <div class="time-stamp" id="invDisplay">--:--</div>
        </div>

        <div class="result-panel panel-blue">
            <div class="result-info">
                <div class="result-title">🔥 青箱保管枠が埋まる時刻</div>
                <div class="duration-hint" id="blueHint">（残り --時間--分）</div>
            </div>
            <div class="time-stamp" id="blueDisplay">--:--</div>
        </div>

        <div class="result-panel panel-white">
            <div class="result-info">
                <div class="result-title">⬜ 白箱保管枠が埋まる時刻</div>
                <div class="duration-hint" id="whiteHint">（残り --時間--分）</div>
            </div>
            <div class="time-stamp" id="whiteDisplay">--:--</div>
        </div>
    </div>
</div>

<script>
    function calculateLimitTime() {
        const clearTime = parseInt(document.getElementById('clearTime').value) || 210;
        const addInv = parseInt(document.getElementById('addInv').value) || 84;
        
        const blueCT = (parseInt(document.getElementById('blueCT').value) || 7) * 60;
        const whiteCT = (parseInt(document.getElementById('whiteCT').value) || 5) * 60;
        
        const blueOpenTime = Math.max(1, 600 - (parseInt(document.getElementById('blueOpenReduce').value) || 55));
        const whiteOpenTime = Math.max(1, 300 - (parseInt(document.getElementById('whiteOpenReduce').value) || 29));
        
        const maxInv = 20 + addInv;
        const maxBlueStorage = 5 + (parseInt(document.getElementById('blueMax').value) || 6);
        const maxWhiteStorage = 5 + (parseInt(document.getElementById('whiteMax').value) || 12);

        let currentSec = 0;
        let invCount = 0;

        // 保管枠のシミュレート（配列の中身は「自動開封完了までの残り秒数」）
        let whiteStorage = [];
        let blueStorage = [];

        let invFullSec = -1;
        let blueFullSec = -1;
        let whiteFullSec = -1;

        let lastBlueDrop = -blueCT;

        // 0秒時点の初期ドロップ
        if (whiteStorage.length < maxWhiteStorage) whiteStorage.push(whiteOpenTime);

        // 最大48時間シミュレート
        while (currentSec < 172800) {
            currentSec++;

            // 1秒経過処理（各保管枠の先頭の開封タイマーを進める）
            // ただし、インベントリが満杯の場合は、開封が完了してもインベントリに吸い込まれずスタックが詰まる
            let invHasSpace = (invCount < maxInv);

            if (whiteStorage.length > 0) {
                if (whiteStorage[0] > 0) {
                    whiteStorage[0]--;
                } else if (invHasSpace) {
                    // 開封完了していてインベントリに空きがあれば吸い込まれる
                    whiteStorage.shift();
                    invCount++;
                }
            }

            // インベントリの空き状況を再更新
            invHasSpace = (invCount < maxInv);

            if (blueStorage.length > 0) {
                if (blueStorage[0] > 0) {
                    blueStorage[0]--;
                } else if (invHasSpace) {
                    blueStorage.shift();
                    invCount++;
                }
            }

            // インベントリ満杯の判定
            if (invCount >= maxInv && invFullSec === -1) {
                invFullSec = currentSec;
            }

            // 白箱のドロップ判定 (5分毎)
            if (currentSec % whiteCT === 0) {
                if (whiteStorage.length < maxWhiteStorage) {
                    whiteStorage.push(whiteOpenTime);
                } else {
                    if (whiteFullSec === -1) whiteFullSec = currentSec;
                }
            }

            // 青箱のドロップ判定 (クリア時かつCT開け)
            if (currentSec % clearTime === 0) {
                if (currentSec - lastBlueDrop >= blueCT) {
                    if (blueStorage.length < maxBlueStorage) {
                        blueStorage.push(blueOpenTime);
                        lastBlueDrop = currentSec;
                    } else {
                        if (blueFullSec === -1) blueFullSec = currentSec;
                    }
                }
            }

            // すべて埋まる時刻が確定したら終了
            if (invFullSec !== -1 && blueFullSec !== -1 && whiteFullSec !== -1) break;
        }

        const now = new Date();
        document.getElementById('startTimeLog').innerText = `計測開始時刻 ➔ ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;

        renderRow(now, invFullSec, 'invDisplay', 'invHint');
        renderRow(now, blueFullSec, 'blueDisplay', 'blueHint');
        renderRow(now, whiteFullSec, 'whiteDisplay', 'whiteHint');
    }

    function renderRow(nowDate, limitSeconds, displayId, hintId) {
        if (limitSeconds === -1 || limitSeconds === Infinity) {
            document.getElementById(displayId).innerText = "∞";
            document.getElementById(hintId).innerText = "（永続セーフ）";
            return;
        }
        const targetDate = new Date(nowDate.getTime() + limitSeconds * 1000);
        const h = targetDate.getHours().toString().padStart(2, '0');
        const m = targetDate.getMinutes().toString().padStart(2, '0');
        document.getElementById(displayId).innerText = `${h}:${m}`;
        
        const dh = Math.floor(limitSeconds / 3600);
        const dm = Math.floor((limitSeconds % 3600) / 60);
        document.getElementById(hintId).innerText = `（残り ${dh > 0 ? dh+'h'+dm+'m' : dm+'m'}）`;
    }
</script>
</body>
</html>

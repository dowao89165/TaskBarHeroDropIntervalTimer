<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TBH青箱ドロップ間隔タイマー</title>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --card-bg: #16213e;
            --accent-blue: #4361ee;
            --accent-cyan: #4cc9f0;
            --accent-pink: #f72585;
            --accent-green: #23d160;
            --text-color: #e0e0e0;
            --sub-text: #a2a8d3;
        }

        body {
            font-family: 'Segoe UI', 'Meiryo', sans-serif;
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: align-items 0.3s ease;
        }

        /* PCにおける配置ルールの定義 */
        @media (min-width: 768px) {
            body.pos-left { align-items: flex-start; }
            body.pos-center { align-items: center; }
            body.pos-right { align-items: flex-end; }
        }

        .app-card {
            background-color: var(--card-bg);
            max-width: 500px;
            width: 100%;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid #0f3460;
            position: relative;
            box-sizing: border-box;
        }

        .edit-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: 1px solid var(--accent-cyan);
            color: var(--accent-cyan);
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
            z-index: 10;
        }
        .edit-toggle.active {
            background-color: var(--accent-cyan);
            color: var(--card-bg);
            font-weight: bold;
        }

        h1 {
            text-align: center;
            font-size: 20px;
            margin: 0 0 20px 0;
            color: var(--accent-cyan);
            padding-right: 60px;
            word-break: break-all;
        }

        .instructions {
            background-color: #0f3460;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            line-height: 1.5;
            margin-bottom: 20px;
            color: var(--sub-text);
        }

        .instructions ul {
            margin: 5px 0;
            padding-left: 20px;
        }

        .settings-area {
            background-color: var(--bg-color);
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border: 1px dashed var(--accent-blue);
        }

        .settings-area label {
            font-size: 14px;
            font-weight: bold;
        }

        .settings-area input {
            background-color: var(--card-bg);
            border: 2px solid var(--accent-blue);
            color: white;
            width: 60px;
            font-size: 18px;
            font-weight: bold;
            padding: 5px;
            text-align: center;
            border-radius: 6px;
            outline: none;
        }

        #timerList {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .timer-row {
            display: flex;
            align-items: center;
            background-color: var(--bg-color);
            padding: 8px 12px;
            border-radius: 10px;
            border-left: 4px solid var(--accent-blue);
            min-height: 50px;
        }

        .del-btn {
            display: none;
            background-color: #ff4d4d;
            color: white;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            font-size: 12px;
            cursor: pointer;
            margin-right: 10px;
            flex-shrink: 0;
        }

        .main-btn {
            background-color: var(--accent-blue);
            color: white;
            border: none;
            font-size: 14px;
            font-weight: bold;
            padding: 8px 12px;
            min-width: 85px;
            border-radius: 6px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .time-display {
            font-size: 22px;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            color: var(--accent-cyan);
            margin-left: auto;
            margin-right: 15px;
        }

        .reset-btn {
            background-color: #e0e0e0;
            color: #333;
            border: none;
            font-size: 11px;
            font-weight: bold;
            padding: 5px 8px;
            border-radius: 4px;
            cursor: pointer;
        }

        .go-text {
            color: var(--accent-pink) !important;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        #addArea {
            display: none;
            margin-top: 15px;
            text-align: center;
        }
        .add-btn {
            background-color: var(--accent-green);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 15px;
        }

        .position-controller {
            display: none;
            background-color: var(--bg-color);
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #0f3460;
            margin-bottom: 15px;
        }
        .position-controller-title {
            font-size: 12px;
            color: var(--sub-text);
            margin-bottom: 8px;
            font-weight: bold;
        }
        .pos-btn-group {
            display: flex;
            justify-content: center;
            gap: 8px;
        }
        .pos-btn {
            background-color: var(--card-bg);
            border: 1px solid var(--accent-blue);
            color: var(--sub-text);
            font-size: 12px;
            padding: 5px 15px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .pos-btn.active {
            background-color: var(--accent-blue);
            color: white;
            font-weight: bold;
        }

        .clear-time-panel {
            margin-top: 25px;
            padding: 15px;
            background-color: var(--bg-color);
            border-radius: 12px;
            border: 1px solid #0f3460;
        }

        .panel-title {
            font-size: 14px;
            font-weight: bold;
            color: var(--accent-cyan);
            margin-bottom: 12px;
            text-align: center;
            border-bottom: 1px solid #0f3460;
            padding-bottom: 5px;
        }

        .clear-time-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .clear-time-row:last-child {
            margin-bottom: 0;
        }

        .clear-time-label {
            color: var(--sub-text);
            font-weight: bold;
            max-width: 150px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .clear-time-input-wrap {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .clear-time-input-wrap input {
            background-color: var(--card-bg);
            border: 1px solid var(--accent-blue);
            color: white;
            width: 50px;
            font-size: 14px;
            padding: 4px;
            text-align: center;
            border-radius: 4px;
            outline: none;
        }

        .audio-area {
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid #0f3460;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .volume-container {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
        }

        input[type="range"] {
            width: 120px;
            cursor: pointer;
        }

        .test-btn {
            background-color: var(--accent-green);
            color: white;
            border: none;
            font-size: 13px;
            font-weight: bold;
            padding: 6px 15px;
            border-radius: 6px;
            cursor: pointer;
        }

        .is-editing .del-btn { display: inline-block; }
        .is-editing #addArea { display: block; }
        .is-editing .main-btn { filter: grayscale(1); pointer-events: none; }
        
        @media (min-width: 768px) {
            .is-editing .position-controller { display: block; }
        }
    </style>
</head>
<body>

    <div class="app-card" id="appCard">
        <button class="edit-toggle" id="editToggle" onclick="toggleEditMode()">編集</button>
        <h1>TBH青箱ドロップ間隔タイマー</h1>

        <div class="instructions">
            <strong>【使い方】</strong>
            <ul>
                <li>下の入力欄に「ドロップ間隔」を設定します。</li>
                <li>各ボタンを押すとカウントダウンが始まります。</li>
            </ul>
        </div>

        <div class="settings-area">
            <label for="intervalInput">宝箱ドロップ間隔：</label>
            <input type="number" id="intervalInput" value="13" min="1">
            <span>分</span>
        </div>

        <div id="timerList"></div>

        <div id="addArea">
            <button class="add-btn" onclick="addNewTimer()">➕ 新規ボタンを追加</button>
            
            <div class="position-controller">
                <div class="position-controller-title">💻 PC限定：アプリの表示位置</div>
                <div class="pos-btn-group">
                    <button class="pos-btn" id="pos-left" onclick="changePosition('left')">左寄せ</button>
                    <button class="pos-btn" id="pos-center" onclick="changePosition('center')">中央</button>
                    <button class="pos-btn" id="pos-right" onclick="changePosition('right')">右寄せ</button>
                </div>
            </div>
        </div>

        <div class="clear-time-panel">
            <div class="panel-title">⏱ 各ボタンのクリア時間設定</div>
            <div id="clearTimeSettingsList"></div>
        </div>

        <div class="audio-area">
            <div class="volume-container">
                <label>通知音音量</label>
                <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="0.5">
            </div>
            <button class="test-btn" onclick="playSound()">通知音テスト</button>
        </div>
    </div>

<script>
    const defaultData = [
        { name: "N3-5", clearTime: 0 },
        { name: "H2-5", clearTime: 0 },
        { name: "T1-3", clearTime: 0 }
    ];
    let timerPresets = [];
    let runningTimers = {};

    window.onload = () => {
        const saved = localStorage.getItem('tbh_timer_presets_v3');
        if (saved) {
            timerPresets = JSON.parse(saved);
        } else {
            const oldSaved = localStorage.getItem('tbh_timer_presets_v2');
            if (oldSaved) {
                timerPresets = JSON.parse(oldSaved);
            } else {
                timerPresets = defaultData;
            }
        }
        renderApp();

        const savedPos = localStorage.getItem('tbh_timer_position') || 'center';
        changePosition(savedPos);
    };

    function changePosition(pos) {
        document.body.classList.remove('pos-left', 'pos-center', 'pos-right');
        document.body.classList.add(`pos-${pos}`);

        document.querySelectorAll('.pos-btn').forEach(btn => btn.classList.remove('active'));
        const activeBtn = document.getElementById(`pos-${pos}`);
        if (activeBtn) activeBtn.classList.add('active');

        localStorage.setItem('tbh_timer_position', pos);
    }

    function renderApp() {
        const list = document.getElementById('timerList');
        const configList = document.getElementById('clearTimeSettingsList');
        
        list.innerHTML = "";
        configList.innerHTML = "";
        
        timerPresets.forEach((item, index) => {
            const row = document.createElement('div');
            row.className = 'timer-row';
            row.innerHTML = `
                <button class="del-btn" onclick="deleteTimer(${index})">✕</button>
                <button class="main-btn" onclick="startTimer(${index})">${item.name}</button>
                <span class="time-display" id="display-${index}">--:--</span>
                <button class="reset-btn" onclick="resetTimer(${index})">リセット</button>
            `;
            list.appendChild(row);

            const configRow = document.createElement('div');
            configRow.className = 'clear-time-row';
            configRow.innerHTML = `
                <div class="clear-time-label">${item.name}</div>
                <div class="clear-time-input-wrap">
                    <span>クリア時間：</span>
                    <input type="number" id="clearInput-${index}" value="${item.clearTime || 0}" min="0" onchange="updateClearTime(${index}, this.value)">
                    <span>分</span>
                </div>
            `;
            configList.appendChild(configRow);
        });
    }

    function updateClearTime(index, value) {
        const minutes = parseInt(value) || 0;
        timerPresets[index].clearTime = minutes;
        localStorage.setItem('tbh_timer_presets_v3', JSON.stringify(timerPresets));
    }

    function toggleEditMode() {
        const card = document.getElementById('appCard');
        const btn = document.getElementById('editToggle');
        const isEditing = card.classList.toggle('is-editing');
        btn.innerText = isEditing ? "完了" : "編集";
        btn.classList.toggle('active', isEditing);
    }

    function addNewTimer() {
        const name = prompt("ボタンに表示する名前を入力してください", "新タイマー");
        if (name) {
            timerPresets.push({ name: name, clearTime: 0 });
            saveAndRender();
        }
    }

    function deleteTimer(index) {
        if (confirm(`「${timerPresets[index].name}」を削除しますか？`)) {
            resetTimer(index);
            timerPresets.splice(index, 1);
            saveAndRender();
        }
    }

    function saveAndRender() {
        localStorage.setItem('tbh_timer_presets_v3', JSON.stringify(timerPresets));
        renderApp();
    }

    function startTimer(index) {
        if (runningTimers[index]) {
            clearInterval(runningTimers[index]);
        }

        const baseMinutes = parseInt(document.getElementById('intervalInput').value) || 13;
        const minusMinutes = timerPresets[index].clearTime || 0;

        let targetMinutes = baseMinutes - minusMinutes;
        if (targetMinutes < 0) targetMinutes = 0;
        
        let timeLeft = targetMinutes * 60;

        updateDisplay(index, timeLeft);

        if (timeLeft <= 0) {
            triggerGo(index);
            return;
        }

        runningTimers[index] = setInterval(() => {
            timeLeft--;
            updateDisplay(index, timeLeft);

            if (timeLeft <= 0) {
                clearInterval(runningTimers[index]);
                delete runningTimers[index];
                triggerGo(index);
            }
        }, 1000);
    }

    function triggerGo(index) {
        const display = document.getElementById(`display-${index}`);
        if (display) {
            display.innerText = "GO！";
            display.classList.add('go-text');
        }
        playSound();
    }

    function resetTimer(index) {
        if (runningTimers[index]) {
            clearInterval(runningTimers[index]);
            delete runningTimers[index];
        }
        const display = document.getElementById(`display-${index}`);
        if (display) {
            display.innerText = "--:--";
            display.classList.remove('go-text');
        }
    }

    function updateDisplay(index, seconds) {
        const display = document.getElementById(`display-${index}`);
        if (!display) return;
        const m = Math.floor(seconds / 60).toString().padStart(2, '0');
        const s = (seconds % 60).toString().padStart(2, '0');
        display.innerText = `${m}:${s}`;
        display.classList.remove('go-text');
    }

    function playSound() {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const volume = parseFloat(document.getElementById('volumeSlider').value);
        const notes = [659.25, 783.99, 1046.50]; 
        const durations = [0.12, 0.12, 0.25];

        notes.forEach((freq, i) => {
            setTimeout(() => {
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.type = 'triangle';
                oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(volume * 0.2, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + durations[i]);
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + durations[i]);
            }, i * 80);
        });
    }
</script>

</body>
</html>
